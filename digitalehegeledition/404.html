<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seite nicht gefunden — Schelling Digitale Edition</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="assets/style.css">
  <script>document.documentElement.dataset.theme=localStorage.getItem('schelling-theme')||''</script>
</head>
<body>

<header class="site-header" role="banner">
  <a href="index.html" class="site-title" aria-label="Digitale Schelling-Edition — Startseite">
    <span class="site-title-eyebrow">Digitale Edition</span>
    <span class="site-title-main">Schelling · Werke</span>
  </a>
  <nav class="sitenav" aria-label="Hauptnavigation">
    <ul>
      <li><a href="index.html">Sammlung</a></li>
      <li><a href="text.html">Lektüre</a></li>
      <li><a href="search.html">Recherche</a></li>
      <li><a href="feedback.html">Feedback</a></li>
      <li><button class="theme-toggle" onclick="toggleTheme()" title="Darstellung wechseln" aria-label="Farbschema wechseln"></button></li>
    </ul>
  </nav>
</header>

<main class="error-page">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">Seite nicht gefunden</h1>
    <p class="error-text">
      Die angeforderte Seite existiert nicht oder wurde verschoben.
    </p>
    <div class="error-actions">
      <a href="index.html" class="hero-btn-primary">Zur Sammlung</a>
      <a href="search.html" class="hero-btn-secondary">Volltextsuche</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div>Digitale Schelling-Edition</div>
  <nav>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script>
  function toggleTheme() {
    var t = document.documentElement.dataset.theme === 'light' ? '' : 'light';
    document.documentElement.dataset.theme = t;
    localStorage.setItem('schelling-theme', t);
  }
</script>

<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js")</script>
</body>
</html>
